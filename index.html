<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090C">
<title>Crisis Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08090C; color: #8899AA; font-family: 'SF Mono','Menlo','Consolas','Monaco',monospace; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { display: none; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  @keyframes goBorder { 0%,100%{box-shadow:inset 0 0 0 1px rgba(16,185,129,.25)} 50%{box-shadow:inset 0 0 0 1px rgba(16,185,129,.7),0 0 6px rgba(16,185,129,.12)} }
  .header { padding:8px 8px 6px; border-bottom:1px solid #13161E; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#08090C; z-index:20; }
  .header-left { display:flex; align-items:center; gap:6px; }
  .header-right { display:flex; gap:4px; align-items:center; }
  .title { font-size:11px; font-weight:700; color:#E2E8F0; letter-spacing:-.3px; }
  .badge { font-size:8px; color:#3A4050; background:#10131A; padding:1px 4px; border-radius:2px; }
  .auto-dot { width:5px; height:5px; border-radius:50%; background:#10B981; animation:pulse 1.5s infinite; }
  .go-count { font-size:8px; font-weight:700; color:#10B981; animation:pulse 2s infinite; }
  .hot-count { font-size:8px; font-weight:700; color:#F59E0B; }
  .btn { border:none; border-radius:3px; font-size:8px; font-weight:700; cursor:pointer; font-family:inherit; padding:3px 8px; }
  .btn-refresh { background:#1D4ED8; color:#fff; }
  .btn-refresh.loading { background:#10131A; color:#3A4050; }
  .btn-auto { background:#10131A; color:#3A4050; padding:3px 6px; }
  .btn-auto.active { background:#065F46; color:#6EE7B7; }
  .btn-sort { background:transparent; color:#2A3040; border:none; padding:3px 5px; border-radius:2px; font-size:7px; cursor:pointer; font-family:inherit; text-transform:uppercase; font-weight:700; letter-spacing:.3px; }
  .btn-sort.active { background:#1A2744; color:#7CB3F5; }
  .updated { padding:1px 8px 2px; font-size:7px; color:#1E2530; }
  .col-header { display:grid; grid-template-columns:10px 52px 60px 60px 46px; padding:4px 8px; font-size:7px; font-weight:700; color:#2A3040; letter-spacing:.5px; text-transform:uppercase; border-bottom:1px solid #0E1118; position:sticky; top:38px; background:#08090C; z-index:10; }
  .bucket-header { padding:4px 8px; font-size:8px; font-weight:700; border-left-width:2px; border-left-style:solid; background:rgba(255,255,255,.01); display:flex; justify-content:space-between; letter-spacing:.3px; }
  .at-target { color:#10B981; font-size:7px; }
  .row { display:grid; grid-template-columns:10px 52px 60px 60px 46px; padding:6px 8px; align-items:center; cursor:pointer; border-bottom:1px solid #111318; }
  .row.go { background:rgba(16,185,129,.1); animation:goBorder 2s infinite; }
  .row.hot { background:rgba(245,158,11,.06); }
  .signal-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .signal-dot.go { background:#10B981; box-shadow:0 0 5px #10B981; }
  .signal-dot.hot { background:#F59E0B; }
  .signal-dot.wrm { background:#6366F1; }
  .signal-dot.none { background:#222; }
  .ticker { font-size:11px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ticker.go { color:#34D399; } .ticker.hot { color:#FCD34D; } .ticker.default { color:#B8C0CC; }
  .now-cell { display:flex; flex-direction:column; align-items:flex-end; }
  .now-input { background:transparent; border:none; border-bottom:1px dotted #1A1F2A; color:#C8D0DA; font-size:11px; font-family:inherit; padding:1px 0; width:56px; text-align:right; font-weight:600; }
  .delta { font-size:8px; font-weight:700; line-height:1; }
  .delta.up { color:#10B981; } .delta.down { color:#EF4444; }
  .tgt { text-align:right; font-size:10px; font-weight:500; color:#4A5568; }
  .tgt.go { color:#34D399; }
  .gap { text-align:right; font-size:10px; font-weight:700; }
  .gap.go { color:#10B981; } .gap.hot { color:#F59E0B; } .gap.wrm { color:#818CF8; } .gap.none { color:#2D3340; }
  .detail { padding:4px 8px 6px 20px; font-size:9px; color:#5A6577; background:#0B0D12; border-bottom:1px solid #111318; line-height:1.5; }
  .detail-name { color:#7A8899; font-weight:600; }
  .detail-sep { margin:0 4px; color:#2A3040; }
  .detail-meta { color:#2D3340; margin-left:6px; }
  .footer { padding:8px; border-top:1px solid #0E1118; display:flex; gap:8px; font-size:7px; color:#1E2530; flex-wrap:wrap; align-items:center; }
  .legend { display:flex; align-items:center; gap:3px; }
  .legend-dot { width:5px; height:5px; border-radius:50%; }
  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.85); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { background:#12151C; border:1px solid #1E2530; border-radius:8px; padding:20px; max-width:340px; width:100%; }
  .modal h2 { color:#E2E8F0; font-size:13px; margin-bottom:8px; }
  .modal p { font-size:10px; color:#5A6577; line-height:1.5; margin-bottom:12px; }
  .modal a { color:#60A5FA; text-decoration:none; }
  .modal input[type=text] { width:100%; background:#08090C; border:1px solid #1E2530; color:#C8D0DA; font-family:inherit; font-size:11px; padding:8px; border-radius:4px; margin-bottom:12px; outline:none; }
  .modal .btn-save { background:#1D4ED8; color:#fff; border:none; border-radius:4px; padding:8px 16px; font-size:10px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; }
  .modal .btn-save:disabled { opacity:.4; cursor:not-allowed; }
  .error-msg { color:#EF4444; font-size:9px; margin-bottom:8px; }
  .radar-header { padding:6px 8px; font-size:9px; font-weight:700; color:#F97316; border-left:2px solid #F97316; background:rgba(249,115,22,.05); display:flex; justify-content:space-between; align-items:center; cursor:pointer; margin-top:4px; }
  .radar-count { font-size:8px; color:#FB923C; }
  .radar-toggle { font-size:8px; color:#5A6577; }
  .radar-row { display:grid; grid-template-columns:52px 60px 52px 64px; padding:5px 8px 5px 18px; align-items:center; border-bottom:1px solid #0E1118; }
  .radar-ticker { font-size:10px; font-weight:700; color:#D4D4D8; }
  .radar-price { font-size:10px; text-align:right; color:#9CA3AF; }
  .radar-drop { font-size:10px; font-weight:700; text-align:right; color:#EF4444; }
  .radar-name { font-size:8px; text-align:right; color:#3A4050; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .radar-scanning { padding:6px 18px; font-size:8px; color:#334; }
  .progress-bar { height:2px; background:#111318; margin:0 8px; overflow:hidden; }
  .progress-fill { height:100%; background:#F97316; transition:width 0.3s; }
</style>
</head>
<body>
<div id="app"></div>
<script>

// WATCHLIST
const WATCHLIST = [
  { t:"GOOGL", n:"Alphabet", b:1, tgt:295, p:1, r:"Tech rotation. Zero ME exposure." },
  { t:"AMZN", n:"Amazon", b:1, tgt:200, p:2, r:"AWS untouched. Cloud on sale." },
  { t:"JPM", n:"JPMorgan", b:1, tgt:287, p:3, r:"Benefits from vol & rates." },
  { t:"VICI", n:"VICI Props", b:1, tgt:28.75, p:4, r:"Casino REIT, rate fear only." },
  { t:"NNN", n:"NNN REIT", b:1, tgt:43.25, p:5, r:"Triple-net. 5.3% yield." },
  { t:"ABBV", n:"AbbVie", b:1, tgt:222, p:6, r:"Pharma defensive." },
  { t:"BRK.B", n:"Berkshire", b:1, tgt:490, p:7, r:"Fortress. Back up truck." },
  { t:"IBM", n:"IBM", b:1, tgt:220, p:8, r:"Down 22% YTD. Hold, don't chase." },
  { t:"NEM", n:"Newmont", b:2, tgt:122, p:1, r:"Margin-call cascade risk." },
  { t:"FNV", n:"Franco-Nev", b:2, tgt:265, p:2, r:"Gold royalty forced liq." },
  { t:"XOM", n:"Exxon", b:2, tgt:148, p:3, r:"Gap-up then retrace." },
  { t:"LMT", n:"Lockheed", b:2, tgt:635, p:4, r:"De-escalation whipsaw." },
  { t:"CAT", n:"Caterpillar", b:3, tgt:690, p:1, r:"Cyclical fear selloff. 17x P/E." },
  { t:"CVX", n:"Chevron", b:3, tgt:175, p:2, r:"Oil diversification. 3.8% yield." },
  { t:"RTX", n:"RTX", b:3, tgt:193, p:3, r:"Tomahawk maker. Buy de-escalation dip." },
  { t:"V", n:"Visa", b:3, tgt:300, p:4, r:"Best biz. -14% off ATH." },
  { t:"AEM", n:"Agnico Eagle", b:3, tgt:228, p:5, r:"Best gold miner. Tier 1." },
  { t:"GD", n:"Gen Dynamics", b:3, tgt:335, p:6, r:"Subs, tanks, Gulfstream." },
  { t:"RGLD", n:"Royal Gold", b:3, tgt:275, p:7, r:"Gold royalty/streaming." },
];
const RADAR_UNIVERSE = [
  { t:"MSFT", n:"Microsoft" }, { t:"AAPL", n:"Apple" }, { t:"JNJ", n:"J&J" },
  { t:"PG", n:"Procter Gamble" }, { t:"KO", n:"Coca-Cola" }, { t:"PEP", n:"PepsiCo" },
  { t:"MCD", n:"McDonalds" }, { t:"WMT", n:"Walmart" }, { t:"COST", n:"Costco" },
  { t:"HD", n:"Home Depot" }, { t:"LOW", n:"Lowes" }, { t:"CL", n:"Colgate" },
  { t:"MMM", n:"3M" }, { t:"SHW", n:"Sherwin-Williams" }, { t:"ITW", n:"Illinois Tool" },
  { t:"EMR", n:"Emerson" }, { t:"META", n:"Meta" }, { t:"NVDA", n:"Nvidia" },
  { t:"AVGO", n:"Broadcom" }, { t:"CRM", n:"Salesforce" }, { t:"ADBE", n:"Adobe" },
  { t:"ORCL", n:"Oracle" }, { t:"CSCO", n:"Cisco" }, { t:"TXN", n:"Texas Inst" },
  { t:"INTC", n:"Intel" }, { t:"QCOM", n:"Qualcomm" }, { t:"AMAT", n:"Applied Mat" },
  { t:"NOW", n:"ServiceNow" }, { t:"HON", n:"Honeywell" }, { t:"UNP", n:"Union Pacific" },
  { t:"UPS", n:"UPS" }, { t:"DE", n:"Deere" }, { t:"BA", n:"Boeing" },
  { t:"NOC", n:"Northrop" }, { t:"GE", n:"GE Aerospace" }, { t:"WM", n:"Waste Mgmt" },
  { t:"ETN", n:"Eaton" }, { t:"PH", n:"Parker Hannifin" }, { t:"FDX", n:"FedEx" },
  { t:"O", n:"Realty Income" }, { t:"AMT", n:"American Tower" }, { t:"PLD", n:"Prologis" },
  { t:"SPG", n:"Simon Property" }, { t:"PSA", n:"Public Storage" }, { t:"DLR", n:"Digital Realty" },
  { t:"WPC", n:"W.P. Carey" }, { t:"GS", n:"Goldman Sachs" }, { t:"MS", n:"Morgan Stanley" },
  { t:"BLK", n:"BlackRock" }, { t:"SCHW", n:"Schwab" }, { t:"AXP", n:"Amex" },
  { t:"CB", n:"Chubb" }, { t:"TRV", n:"Travelers" }, { t:"PGR", n:"Progressive" },
  { t:"UNH", n:"UnitedHealth" }, { t:"LLY", n:"Eli Lilly" }, { t:"PFE", n:"Pfizer" },
  { t:"MRK", n:"Merck" }, { t:"TMO", n:"Thermo Fisher" }, { t:"MDT", n:"Medtronic" },
  { t:"ISRG", n:"Intuitive Surg" }, { t:"SYK", n:"Stryker" },
  { t:"COP", n:"ConocoPhillips" }, { t:"SLB", n:"Schlumberger" }, { t:"EOG", n:"EOG Resources" },
  { t:"FCX", n:"Freeport McMoRan" }, { t:"APD", n:"Air Products" }, { t:"LIN", n:"Linde" },
];
const RADAR_THRESHOLD = -3;
const BM = { 1:{label:"LIKELY DROP",color:"#EF4444"}, 2:{label:"COUNTER-INTUITIVE",color:"#3B82F6"}, 3:{label:"NEW POSITIONS",color:"#10B981"} };

// STATE
let S = {
  apiKey: localStorage.getItem("finnhub_key") || "",
  items: WATCHLIST.map(w => ({ ...w, cur:null, pc:null, dp:null, prevCur:null })),
  radarResults: [],
  radarOpen: true,
  radarScanning: false,
  radarProgress: 0,
  loading: false, lastUpdated:null, sort:"bucket",
  autoRefresh:false, autoInterval:null, expanded:null, error:null,
};

async function fetchQuote(sym, key) {
  const r = await fetch("https://finnhub.io/api/v1/quote?symbol="+encodeURIComponent(sym)+"&token="+key);
  if (!r.ok) throw new Error("HTTP "+r.status);
  const d = await r.json();
  if (d.c===0 && d.pc===0) throw new Error("No data");
  return { current:d.c, prevClose:d.pc, change:d.d, changePct:d.dp };
}

async function refreshWatchlist() {
  S.items.forEach(i => { if (i.cur !== null) i.prevCur = i.cur; });
  let ok = 0;
  for (const item of S.items) {
    try {
      const q = await fetchQuote(item.t, S.apiKey);
      item.cur = q.current; item.pc = q.prevClose; item.dp = q.changePct; ok++;
    } catch(e) {
      console.warn("Failed "+item.t+":", e.message);
      if (ok===0 && (e.message.includes("403")||e.message.includes("401"))) { S.error="Invalid API key"; break; }
    }
    await new Promise(r => setTimeout(r, 50));
  }
  return ok;
}

async function scanRadar() {
  S.radarScanning = true; S.radarProgress = 0; S.radarResults = []; render();
  const total = RADAR_UNIVERSE.length;
  const hits = [];
  for (let i = 0; i < total; i++) {
    const entry = RADAR_UNIVERSE[i];
    try {
      const q = await fetchQuote(entry.t, S.apiKey);
      if (q.changePct !== null && q.changePct <= RADAR_THRESHOLD) {
        hits.push({ t:entry.t, n:entry.n, cur:q.current, pc:q.prevClose, dp:q.changePct });
      }
    } catch(e) { console.warn("Radar skip "+entry.t+":", e.message); }
    S.radarProgress = Math.round(((i+1)/total)*100);
    await new Promise(r => setTimeout(r, 50));
    if ((i+1) % 55 === 0) await new Promise(r => setTimeout(r, 5000));
    if (i % 10 === 0) render();
  }
  hits.sort((a,b) => a.dp - b.dp);
  S.radarResults = hits; S.radarScanning = false; render();
}

async function refreshAll() {
  if (!S.apiKey) return;
  S.loading = true; S.error = null; render();
  const ok = await refreshWatchlist();
  if (ok > 0) S.lastUpdated = new Date();
  S.loading = false; render();
  await scanRadar();
}

const disc = (c,t) => ((c-t)/t)*100;
function sig(c,t) { if(c===null) return ""; const p=disc(c,t); return p<=0?"GO":p<=2?"HOT":p<=5?"WRM":""; }
function getSorted() {
  const a = [...S.items];
  if (S.sort==="disc") return a.sort((x,y) => { if(x.cur===null&&y.cur===null)return 0; if(x.cur===null)return 1; if(y.cur===null)return -1; return disc(x.cur,x.tgt)-disc(y.cur,y.tgt); });
  if (S.sort==="sig") { const o={GO:0,HOT:1,WRM:2,"":3}; return a.sort((x,y) => o[sig(x.cur,x.tgt)]-o[sig(y.cur,y.tgt)]); }
  return a.sort((x,y) => x.b-y.b||x.p-y.p);
}
function fmt(p) { return p===null?"\u2014":p<50?p.toFixed(2):p.toFixed(0); }

// RENDER
function render() {
  const app = document.getElementById('app');
  const sorted = getSorted();
  const goN = S.items.filter(i => sig(i.cur,i.tgt)==='GO').length;
  const hotN = S.items.filter(i => sig(i.cur,i.tgt)==='HOT').length;
  let h = '';

  if (!S.apiKey) {
    h += '<div class="modal-overlay"><div class="modal">'
      +'<h2>Finnhub API Key</h2>'
      +'<p>Free real-time US stock quotes. Get yours at <a href="https://finnhub.io/register" target="_blank">finnhub.io/register</a></p>'
      +(S.error?'<div class="error-msg">'+S.error+'</div>':'')
      +'<input type="text" id="apiKeyInput" placeholder="Paste your API key here" />'
      +'<button class="btn-save" id="saveKey">CONNECT</button>'
      +'</div></div>';
  }

  h += '<div class="header"><div class="header-left">'
    +'<span class="title">CRISIS</span><span class="badge">IRAN·HORMUZ</span>'
    +(S.autoRefresh?'<span class="auto-dot"></span>':'')
    +(goN>0?'<span class="go-count">'+goN+'GO</span>':'')
    +(hotN>0?'<span class="hot-count">'+hotN+'HOT</span>':'')
    +'</div><div class="header-right">'
    +'<button class="btn btn-refresh'+(S.loading?' loading':'')+'" id="refreshBtn"'+(S.loading?' disabled':'')+'>'+(S.loading?'···':'⟳')+'</button>'
    +'<button class="btn btn-auto'+(S.autoRefresh?' active':'')+'" id="autoBtn">'+(S.autoRefresh?'A·ON':'A')+'</button>'
    +'<button class="btn-sort'+(S.sort==='bucket'?' active':'')+'" data-sort="bucket">BKT</button>'
    +'<button class="btn-sort'+(S.sort==='disc'?' active':'')+'" data-sort="disc">DSC</button>'
    +'<button class="btn-sort'+(S.sort==='sig'?' active':'')+'" data-sort="sig">SIG</button>'
    +'</div></div>';

  if (S.lastUpdated) h += '<div class="updated">'+S.lastUpdated.toLocaleTimeString()+'</div>';
  if (S.error && S.apiKey) h += '<div style="padding:4px 8px;font-size:9px;color:#EF4444;background:#1C1017">'+S.error+'</div>';

  h += '<div class="col-header"><span></span><span>TICK</span><span style="text-align:right">NOW</span><span style="text-align:right">TGT</span><span style="text-align:right">GAP</span></div>';

  function renderRow(item) {
    const s = sig(item.cur,item.tgt);
    const d = item.cur!==null?disc(item.cur,item.tgt):null;
    const rc = s==="GO"?"go":s==="HOT"?"hot":"";
    const tc = s==="GO"?"go":s==="HOT"?"hot":"default";
    let dH = "";
    if (item.prevCur!==null && item.cur!==null && item.prevCur!==item.cur) {
      const dp = ((item.cur-item.prevCur)/item.prevCur)*100;
      dH = '<span class="delta '+(dp>0?'up':'down')+'">'+(dp>0?'↑':'↓')+Math.abs(dp).toFixed(1)+'%</span>';
    } else if (item.dp!==null && Math.abs(item.dp)>0.005) {
      const dp = item.dp;
      dH = '<span class="delta '+(dp>0?'up':'down')+'">'+(dp>0?'↑':'↓')+Math.abs(dp).toFixed(1)+'%</span>';
    }
    const gt = d!==null?(d<=0?'✓':'')+(-d).toFixed(1)+'%':'—';
    const gc = d===null?"none":d<=0?"go":d<=2?"hot":d<=5?"wrm":"none";
    let rr = '<div class="row '+rc+'" data-ticker="'+item.t+'">'
      +'<span class="signal-dot '+(s==="GO"?"go":s==="HOT"?"hot":s==="WRM"?"wrm":"none")+'"></span>'
      +'<span class="ticker '+tc+'">'+item.t+'</span>'
      +'<div class="now-cell"><input type="number" step="0.01" class="now-input" data-ticker="'+item.t+'" value="'+(item.cur!==null?item.cur:'')+'" placeholder="—" />'+dH+'</div>'
      +'<span class="tgt'+(s==="GO"?' go':'')+'">'+fmt(item.tgt)+'</span>'
      +'<span class="gap '+gc+'">'+gt+'</span></div>';
    if (S.expanded===item.t) {
      const pcH = item.pc?'<span class="detail-meta">Prev close $'+item.pc.toFixed(2)+'</span>':'';
      rr += '<div class="detail"><span class="detail-name">'+item.n+'</span><span class="detail-sep">·</span>'+item.r+pcH+'</div>';
    }
    return rr;
  }

  if (S.sort==="bucket") {
    [1,2,3].forEach(bn => {
      const g = sorted.filter(i => i.b===bn);
      const m = BM[bn];
      const at = g.filter(i => sig(i.cur,i.tgt)==="GO").length;
      h += '<div class="bucket-header" style="color:'+m.color+';border-left-color:'+m.color+'"><span>'+bn+'· '+m.label+'</span>'
        +(at>0?'<span class="at-target">'+at+' TARGET</span>':'')+'</div>';
      g.forEach(i => { h += renderRow(i); });
    });
  } else { sorted.forEach(i => { h += renderRow(i); }); }

  // RADAR SECTION
  const radarCount = S.radarResults.length;
  const radarLabel = S.radarScanning ? 'SCANNING... '+S.radarProgress+'%' : (radarCount > 0 ? radarCount+' ALERT'+(radarCount>1?'S':'') : 'NO ALERTS');
  
  h += '<div class="radar-header" id="radarToggle">'
    +'<span>⚠ RADAR · '+radarLabel+'</span>'
    +'<span class="radar-toggle">'+(S.radarOpen?'▲':'▼')+'</span>'
    +'</div>';

  if (S.radarScanning) {
    h += '<div class="progress-bar"><div class="progress-fill" style="width:'+S.radarProgress+'%"></div></div>';
  }

  if (S.radarOpen && !S.radarScanning) {
    if (S.radarResults.length === 0 && S.lastUpdated) {
      h += '<div class="radar-scanning">No tickers down more than 3% today in scan universe ('+RADAR_UNIVERSE.length+' stocks)</div>';
    }
    S.radarResults.forEach(r => {
      h += '<div class="radar-row">'
        +'<span class="radar-ticker">'+r.t+'</span>'
        +'<span class="radar-price">$'+(r.cur<50?r.cur.toFixed(2):r.cur.toFixed(0))+'</span>'
        +'<span class="radar-drop">↓'+Math.abs(r.dp).toFixed(1)+'%</span>'
        +'<span class="radar-name">'+r.n+'</span>'
        +'</div>';
    });
  }

  // FOOTER
  h += '<div class="footer">'
    +'<span class="legend"><span class="legend-dot" style="background:#10B981"></span>GO</span>'
    +'<span class="legend"><span class="legend-dot" style="background:#F59E0B"></span>HOT</span>'
    +'<span class="legend"><span class="legend-dot" style="background:#6366F1"></span>WRM</span>'
    +'<span>\u00b7 Tap row \u00b7 Finnhub RT</span>'
    +(S.apiKey?'<span style="cursor:pointer;color:#334" id="changeKey">\uD83D\uDD11</span>':'')
    +'</div>';

  app.innerHTML = h;
  bindEvents();
}

// EVENT BINDING
function bindEvents() {
  const sk = document.getElementById("saveKey");
  if (sk) sk.addEventListener("click", async () => {
    const inp = document.getElementById("apiKeyInput"); const k = inp.value.trim(); if(!k) return;
    sk.disabled=true; sk.textContent="Testing...";
    try { await fetchQuote("AAPL",k); S.apiKey=k; localStorage.setItem("finnhub_key",k); S.error=null; render(); refreshAll(); }
    catch(e) { S.error="Invalid key or connection error."; sk.disabled=false; sk.textContent="CONNECT"; render(); }
  });
  const rb = document.getElementById("refreshBtn");
  if (rb) rb.addEventListener("click", refreshAll);
  const ab = document.getElementById("autoBtn");
  if (ab) ab.addEventListener("click", () => {
    S.autoRefresh=!S.autoRefresh;
    if(S.autoRefresh) S.autoInterval=setInterval(refreshAll,300000);
    else { clearInterval(S.autoInterval); S.autoInterval=null; }
    render();
  });
  document.querySelectorAll(".btn-sort").forEach(b => b.addEventListener("click", () => { S.sort=b.dataset.sort; render(); }));
  document.querySelectorAll(".row").forEach(row => row.addEventListener("click", e => {
    if(e.target.classList.contains("now-input")) return;
    const t = row.dataset.ticker; S.expanded = S.expanded===t?null:t; render();
  }));
  document.querySelectorAll(".now-input").forEach(inp => {
    inp.addEventListener("change", e => {
      const t=e.target.dataset.ticker, v=parseFloat(e.target.value);
      if(!isNaN(v)){ const it=S.items.find(i=>i.t===t); if(it){if(it.cur!==null)it.prevCur=it.cur; it.cur=v; S.lastUpdated=new Date(); render();} }
    });
    inp.addEventListener("click", e => e.stopPropagation());
  });
  const ck = document.getElementById("changeKey");
  if (ck) ck.addEventListener("click", () => { S.apiKey=""; localStorage.removeItem("finnhub_key"); clearInterval(S.autoInterval); S.autoRefresh=false; render(); });
  const rt = document.getElementById("radarToggle");
  if (rt) rt.addEventListener("click", () => { S.radarOpen = !S.radarOpen; render(); });
}

// INIT
render();
if (S.apiKey) refreshAll();
</script>
</body>
</html>
